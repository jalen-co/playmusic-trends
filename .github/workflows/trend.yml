name: trend-pull

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests pandas lxml

      - name: Pull trends
        run: python trend_pull.py

      - name: Commit data
        run: |
          git config user.name  "trend-bot"
          git config user.email "trend-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "data: refresh $(date -u +%FT%TZ)"
          git pull --rebase
          git push
