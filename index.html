<title>PlayMusic · Trend Monitor</title>

<style>
:root{--bg:#0c1014;--panel:#13191f;--panel2:#171f27;--line:#222c36;--txt:#e6edf3;
  --muted:#8a97a6;--dim:#5b6675;--up:#3fb950;--down:#e0883a;--flat:#5b6675;--accent:#4aa3ff;
  --gold:#d4a843;--surface:#1a3a2a}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,sans-serif}
body{padding:20px;max-width:1120px;margin:0 auto}
header{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;border-bottom:1px solid var(--line);padding-bottom:12px}
h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:22px;letter-spacing:-.02em;margin:0}
h1 .sub{color:var(--dim);font-weight:500;font-size:12px;letter-spacing:.05em;text-transform:uppercase;margin-left:6px}
.stamp{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);margin-left:auto}
.src{display:flex;gap:8px;align-items:center;margin:12px 0 4px;font-size:12.5px}
.src label{color:var(--muted);font-family:"JetBrains Mono",monospace}
.src input{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:7px 10px;border-radius:6px;font-family:"JetBrains Mono",monospace;font-size:12px}
.src button{background:var(--accent);color:#03121f;border:0;padding:7px 14px;border-radius:6px;font-weight:600;cursor:pointer}
.banner{margin:10px 0;padding:9px 12px;border-radius:6px;font-size:12.5px;display:none}
.banner.show{display:block}.banner.sample{background:#2a2310;border:1px solid #4a3c12;color:#e8c878}

/* Genre momentum strip */
.momentum{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 8px}
.momentum h3{width:100%;margin:0 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);font-weight:600;font-family:"JetBrains Mono",monospace}
.mpill{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);padding:5px 10px;border-radius:6px;font-size:12px;font-family:"JetBrains Mono",monospace}
.mpill .mname{color:var(--txt);font-weight:600}
.mpill .mcount{color:var(--muted)}
.mpill .marrow{font-weight:700;font-size:13px}
.mpill .marrow.up{color:var(--up)}.mpill .marrow.down{color:var(--down)}.mpill .marrow.flat{color:var(--flat)}
.mpill.hot{border-color:#1f3d1c;background:#111f14}
.mpill.cold{border-color:#3d1c1c;background:#1f1111}

/* Controls */
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0 6px}
select,.bar input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:6px;font-size:13px}
.bar input[type=text]{min-width:180px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.seg button{background:var(--panel);color:var(--muted);border:0;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.seg button.on{background:var(--panel2);color:var(--txt)}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600}
.chip.on{background:var(--surface);border-color:#2a5a3a;color:var(--up)}
.count{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
.mode-label{font-size:12px;color:var(--dim);font-family:"JetBrains Mono",monospace;padding:4px 0}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:4px}
thead th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line)}
th.num,td.num{text-align:right;font-family:"JetBrains Mono",monospace}
tbody td{padding:9px 10px;border-bottom:1px solid #1a222b;font-size:14px}
tbody tr:hover{background:var(--panel)}
tbody tr.surfaced{background:var(--surface)}
td.rank{font-family:"JetBrains Mono",monospace;color:var(--muted);font-weight:600;width:48px;text-align:right}
td.rank.top{color:var(--accent)}
.title{font-weight:600}.artist{color:var(--muted);font-size:13px}
.genre{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);background:var(--panel2);padding:2px 7px;border-radius:4px;white-space:nowrap}
.mv{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:12.5px}
.mv.up{color:var(--up)}.mv.down{color:var(--down)}.mv.flat{color:var(--flat)}.mv.new{color:var(--up)}
.st{font-family:"JetBrains Mono",monospace;font-size:12.5px;color:var(--muted)}
.badge{font-size:10px;letter-spacing:.03em;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap}
.b-surface{background:#1a3a2a;color:var(--up);border:1px solid #2a5a3a}
.b-apple{background:#0e2942;color:var(--accent);border:1px solid #1d3f5e;font-size:10px;padding:1px 5px;border-radius:3px}
footer{margin-top:18px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--dim);line-height:1.6}
</style>
</head>

","genre":"K-Pop","move":"+8","streams":650000,"on_apple":true,"apple_rank":15,"surface":4},{"rank":40,"title":"Bloodline","artist":"Alex Warren","genre":"Pop","move":"NEW","streams":500000,"on_apple":true,"apple_rank":22,"surface":5},{"rank":88,"title":"back to friends","artist":"sombr","genre":"Alternative","move":"+12","streams":300000,"on_apple":false,"apple_rank":null,"surface":3},{"rank":144,"title":"Deep Cut","artist":"Indie Artist","genre":"Dance","move":"-1","streams":150000,"on_apple":false,"apple_rank":null,"surface":0}]},"europe":{"daily":[{"rank":1,"title":"GBP","artist":"Central Cee","genre":"Hip-Hop/Rap","move":"","streams":2100000,"on_apple":true,"apple_rank":1,"surface":2}],"weekly":[{"rank":1,"title":"GBP","artist":"Central Cee","genre":"Hip-Hop/Rap","move":"","streams":9000000,"on_apple":true,"apple_rank":1,"surface":2}]}}};
const $=s=>document.querySelector(s);
let P=null, state={region:null,period:"daily",genre:"",q:"",surfaceOnly:false};

function fnum(n){return n==null?"":Number(n).toLocaleString();}
function move(m){
  if(!m||m==="")return'';
  if(m==="NEW"||m==="RE")return'<span class="mv new">'+m+'</span>';
  if(m==="=")return'<span class="mv flat">=</span>';
  if(m.startsWith("+"))return'<span class="mv up">▲'+m.slice(1)+'</span>';
  if(m.startsWith("-"))return'<span class="mv down">▼'+m.slice(1)+'</span>';
  return'<span class="mv flat">'+m+'</span>';
}

function renderMomentum(){
  const mm=P.genre_momentum||{};
  const names=Object.keys(mm).sort((a,b)=>mm[b].count-mm[a].count);
  if(!names.length){$("#momentum").innerHTML="";return;}
  $("#momentum").innerHTML='<h3>Genre Momentum (global chart)</h3>'+names.map(g=>{
    const v=mm[g];
    const cls=v.heat>0.15?"hot":v.heat<-0.15?"cold":"";
    const arrow=v.net>0?"▲":v.net<0?"▼":"=";
    const acls=v.net>0?"up":v.net<0?"down":"flat";
    return`<div class="mpill ${cls}"><span class="mname">${g}</span><span class="mcount">${v.count}</span><span class="marrow ${acls}">${arrow}${Math.abs(v.net)}</span></div>`;
  }).join("");
}

function isGenreMode(){return state.genre&&P&&P.genre_charts&&P.genre_charts[state.genre];}
function getRows(){
  if(isGenreMode()) return P.genre_charts[state.genre];
  return((P.data[state.region]||{})[state.period])||[];
}

function render(){
  const gm=isGenreMode(), q=state.q.toLowerCase();
  const all=getRows();
  const rows=all.filter(r=>{
    if(state.surfaceOnly&&!gm&&(r.surface||0)<3) return false;
    if(q&&!((r.artist||"")+" "+(r.title||"")).toLowerCase().includes(q)) return false;
    return true;
  });
  $("#periodseg").style.opacity=gm?"0.3":"1";
  $("#region").style.opacity=gm?"0.3":"1";
  $("#f-surface").style.display=gm?"none":"";

  if(gm){
    $("#modelabel").textContent="Top "+state.genre+" · recent releases · "+rows.length+" songs";
    $("#thead").innerHTML='<tr><th class="num">#</th><th>Track</th><th>Artist</th></tr>';
    $("#rows").innerHTML=rows.map(r=>`<tr>
      <td class="rank ${r.rank<=10?'top':''}">${r.rank}</td>
      <td><span class="title">${r.title||''}</span></td>
      <td><span class="artist">${r.artist||''}</span></td></tr>`).join("");
  } else {
    const label=(P.region_labels||{})[state.region]||state.region;
    const suffix=state.surfaceOnly?" · surface picks only":"";
    $("#modelabel").textContent=label+" · Spotify Top 200 · "+state.period+suffix;
    $("#thead").innerHTML='<tr><th class="num">#</th><th>Track</th><th>Genre</th><th class="num">Move</th><th class="num">Streams</th><th>Signal</th></tr>';
    $("#rows").innerHTML=rows.map(r=>{
      const sf=(r.surface||0)>=3;
      const badges=[];
      if(sf) badges.push('<span class="badge b-surface">SURFACE</span>');
      if(r.on_apple) badges.push('<span class="badge b-apple">APPLE #'+(r.apple_rank||"?")+'</span>');
      return`<tr class="${sf?'surfaced':''}">
        <td class="rank ${r.rank<=10?'top':''}">${r.rank}</td>
        <td><div class="title">${r.title||''}</div><div class="artist">${r.artist||''}</div></td>
        <td>${r.genre?'<span class="genre">'+r.genre+'</span>':''}</td>
        <td class="num">${move(r.move)}</td>
        <td class="num"><span class="st">${fnum(r.streams)}</span></td>
        <td>${badges.join(" ")||''}</td></tr>`;
    }).join("");
  }
  $("#count").textContent=rows.length+(gm?" songs":" of "+all.length);
}

function buildControls(){
  $("#region").innerHTML=(P.regions||[]).map(r=>`<option value="${r}">${(P.region_labels||{})[r]||r.toUpperCase()}</option>`).join("");
  $("#region").value=state.region;
  const gc=P.genre_charts||{};
  const gn=Object.keys(gc).filter(g=>gc[g]&&gc[g].length).sort();
  $("#genre").innerHTML='<option value="">All genres</option>'+gn.map(g=>`<option value="${g}">${g} (${gc[g].length})</option>`).join("");
  $("#genre").value=state.genre;
}

function setData(p,isSample){
  P=p;state.region=(p.regions&&p.regions[0])||"global";state.period="daily";state.genre="";state.surfaceOnly=false;
  $("#f-surface").classList.remove("on");
  $("#stamp").textContent=isSample?"sample":"updated "+(p.generated_at?new Date(p.generated_at).toLocaleString():"?");
  $("#foot").textContent="Trending = Spotify Top 200, true rank order. Surface picks = new entries, big climbers, and/or charting on Apple too. Genre dropdown = dedicated per-genre charts (recent releases only). Genre momentum = rising/falling share of the global chart.";
  renderMomentum();buildControls();render();
}

async function load(url,silent){
  const b=$("#banner");
  try{const res=await fetch(url,{cache:"no-store"});if(!res.ok)throw new Error("HTTP "+res.status);
    setData(await res.json(),false);b.className="banner";b.textContent="";
  }catch(e){if(!silent){b.className="banner err show";
    b.textContent="Could not load ("+e.message+"). Open on GitHub Pages or as a downloaded file.";}
    setData(SAMPLE,true);}
}

$("#region").onchange=e=>{state.region=e.target.value;render();};
$("#genre").onchange=e=>{state.genre=e.target.value;render();};
$("#q").oninput=e=>{state.q=e.target.value;render();};
$("#load").onclick=()=>{const u=$("#url").value.trim();if(u)load(u);};
$("#p-daily").onclick=()=>{state.period="daily";$("#p-daily").classList.add("on");$("#p-weekly").classList.remove("on");render();};
$("#p-weekly").onclick=()=>{state.period="weekly";$("#p-weekly").classList.add("on");$("#p-daily").classList.remove("on");render();};
$("#f-surface").onclick=()=>{state.surfaceOnly=!state.surfaceOnly;$("#f-surface").classList.toggle("on",state.surfaceOnly);render();};

setData(SAMPLE,true);
load('trend_latest.json',true);
</script>
