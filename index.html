<style>
  :root{--bg:#0c1014;--panel:#13191f;--panel2:#171f27;--line:#222c36;--txt:#e6edf3;

  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,sans-serif}
  body{padding:20px;max-width:1080px;margin:0 auto}
  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;border-bottom:1px solid var(--line);padding-bottom:12px}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:23px;letter-spacing:-.02em;margin:0}
  .stamp{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);margin-left:auto}
  .src{display:flex;gap:8px;align-items:center;margin:12px 0 4px;font-size:12.5px}
  .src label{color:var(--muted);font-family:"JetBrains Mono",monospace}
  .src input{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:7px 10px;border-radius:6px;font-family:"JetBrains Mono",monospace;font-size:12px}
  .src button{background:var(--accent);color:#03121f;border:0;padding:7px 14px;border-radius:6px;font-weight:600;cursor:pointer}
  .banner{margin:10px 0;padding:9px 12px;border-radius:6px;font-size:12.5px;display:none}
  .banner.show{display:block}.banner.sample{background:#2a2310;border:1px solid #4a3c12;color:#e8c878}
  .banner.err{background:#2a1414;border:1px solid #4a1f1f;color:#f0a0a0}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:14px 0 6px}
  select,.bar input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:6px;font-size:13px}
  .bar input[type=text]{min-width:180px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--muted);border:0;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--panel2);color:var(--txt)}
  .count{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;margin-top:4px}
  thead th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line)}
  th.num,td.num{text-align:right;font-family:"JetBrains Mono",monospace}
  tbody td{padding:9px 10px;border-bottom:1px solid #1a222b;font-size:14px}
  tbody tr:hover{background:var(--panel)}
  td.rank{font-family:"JetBrains Mono",monospace;color:var(--muted);font-weight:600;width:48px;text-align:right}
  td.rank.top{color:var(--accent)}
  .title{font-weight:600}.artist{color:var(--muted);font-size:13px}
  .genre{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);background:var(--panel2);padding:2px 7px;border-radius:4px;white-space:nowrap}
  .mv{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:12.5px}
  .mv.up{color:var(--up)}.mv.down{color:var(--down)}.mv.flat{color:var(--flat)}.mv.new{color:var(--up)}
  .st{font-family:"JetBrains Mono",monospace;font-size:12.5px;color:var(--muted)}
  .dash{color:var(--dim)}
  details{border:1px solid var(--line);border-radius:8px;margin:8px 0;background:var(--panel)}
  summary{cursor:pointer;padding:12px 14px;font-weight:700;font-family:"Space Grotesk",sans-serif;font-size:16px;display:flex;align-items:center;gap:10px}
  summary .gc{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);font-weight:400}
  details .glist{padding:4px 14px 14px}
  .grow{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #1a222b;font-size:14px;align-items:baseline}
  .grow .r{font-family:"JetBrains Mono",monospace;color:var(--dim);width:28px;text-align:right;flex:none}
  .grow .r.top{color:var(--accent)}
  .grow .gt{font-weight:600}.grow .ga{color:var(--muted)}
  footer{margin-top:18px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--dim);line-height:1.6}
</style>
</head>

</div>
<div id="view"></div>
<footer id="foot"></footer>

  const q=state.q.toLowerCase();
  const rows=all.filter(r=>{
    if(state.genre&&r.genre!==state.genre)return false;
    if(q&&!((r.artist||"")+" "+(r.title||"")).toLowerCase().includes(q))return false;
    return true;
  });
  $("#count").textContent=rows.length+" of "+all.length;
  $("#view").innerHTML=`<table><thead><tr><th class="num">#</th><th>Track</th><th>Genre</th><th class="num">Move</th><th class="num">Streams</th></tr></thead><tbody>`+
    rows.map(r=>`<tr><td class="rank ${r.rank<=10?'top':''}">${r.rank}</td>
      <td><div class="title">${r.title||'—'}</div><div class="artist">${r.artist||'—'}</div></td>
      <td>${r.genre?'<span class="genre">'+r.genre+'</span>':'<span class="dash">—</span>'}</td>
      <td class="num">${move(r.move)}</td>
      <td class="num"><span class="st">${fnum(r.streams)}</span></td></tr>`).join("")+
    `</tbody></table>`;
}

function renderGenre(){
  $("#periodseg").style.display="none";
  $("#gfilter").style.display="none";
  const gc=P.genre_charts||{};
  const names=Object.keys(gc).filter(g=>gc[g]&&gc[g].length).sort((a,b)=>gc[b].length-gc[a].length);
  const q=state.q.toLowerCase();
  if(!names.length){
    $("#view").innerHTML='<p style="padding:14px;color:var(--muted)">No genre charts available yet. Run the pull to populate them.</p>';
    $("#count").textContent=""; return;
  }
  let total=0;
  $("#view").innerHTML=names.map((g,idx)=>{
    let list=gc[g].filter(r=>!q||((r.artist||"")+" "+(r.title||"")).toLowerCase().includes(q));
    total+=list.length;
    const body=list.map(r=>`<div class="grow"><span class="r ${r.rank<=10?'top':''}">${r.rank}</span>
      <span><span class="gt">${r.title}</span> <span class="ga">— ${r.artist}</span></span></div>`).join("")
      ||'<div class="grow"><span class="ga">no matches</span></div>';
    return`<details ${idx<3||q?'open':''}><summary>${g} <span class="gc">${list.length} songs</span></summary><div class="glist">${body}</div></details>`;
  }).join("");
  $("#count").textContent=total+" songs · "+names.length+" genres";
}

function render(){state.view==="trending"?renderTrending():renderGenre();}

function buildControls(){
  $("#region").innerHTML=(P.regions||[]).map(r=>`<option value="${r}">${(P.region_labels&&P.region_labels[r])||r.toUpperCase()}</option>`).join("");
  $("#region").value=state.region;
  const trendGenres=new Set();
  for(const rows of Object.values((P.data[state.region]||{}))){
    if(Array.isArray(rows)) rows.forEach(r=>{if(r.genre)trendGenres.add(r.genre);});
  }
  $("#gfilter").innerHTML='<option value="">All genres</option>'+[...trendGenres].sort().map(g=>`<option value="${g}">${g}</option>`).join("");
  $("#gfilter").value=state.genre;
}

function setData(p,isSample){
  P=p; state.region=(p.regions&&p.regions[0])||"global"; state.period=(p.periods&&p.periods[0])||"daily"; state.genre="";
  $("#stamp").textContent=isSample?"sample data":"updated "+(p.generated_at?new Date(p.generated_at).toLocaleString():"?");
  $("#foot").textContent=isSample
    ?"Sample preview. Trending = Spotify chart ranked by streaming. By Genre = per-genre charts filtered to recent releases only."
    :"Trending = current Spotify charts by region (daily & weekly), true rank order. By Genre = per-genre charts, recent releases only (no catalog noise). Updates each scheduled pull.";
  buildControls(); render();
}

async function load(url,silent){
  const b=$("#banner");
  try{const res=await fetch(url,{cache:"no-store"});if(!res.ok)throw new Error("HTTP "+res.status);
    setData(await res.json(),false);b.className="banner";b.textContent="";
  }catch(e){if(!silent){b.className="banner err show";
    b.textContent="Could not load ("+e.message+"). Open on GitHub Pages or as a downloaded file. Showing sample.";}
    setData(SAMPLE,true);}
}

function setView(v){state.view=v;$("#v-trend").classList.toggle("on",v==="trending");$("#v-genre").classList.toggle("on",v==="genre");render();}
function setPeriod(p){state.period=p;$("#p-daily").classList.toggle("on",p==="daily");$("#p-weekly").classList.toggle("on",p==="weekly");render();}

$("#region").onchange=e=>{state.region=e.target.value;buildControls();render();};
$("#gfilter").onchange=e=>{state.genre=e.target.value;render();};
$("#q").oninput=e=>{state.q=e.target.value;render();};
$("#load").onclick=()=>{const u=$("#url").value.trim();if(u)load(u);};
$("#v-trend").onclick=()=>setView("trending");
$("#v-genre").onclick=()=>setView("genre");
$("#p-daily").onclick=()=>setPeriod("daily");
$("#p-weekly").onclick=()=>setPeriod("weekly");

setData(SAMPLE,true);
load('trend_latest.json',true);
</script>
</body>
</html>
