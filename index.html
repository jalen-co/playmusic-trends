<style>
  :root{--bg:#0c1014;--panel:#13191f;--panel2:#171f27;--line:#222c36;--txt:#e6edf3;
    --muted:#8a97a6;--dim:#5b6675;--up:#3fb950;--down:#e0883a;--flat:#5b6675;--accent:#4aa3ff}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,sans-serif}
  body{padding:20px;max-width:1080px;margin:0 auto}
  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;border-bottom:1px solid var(--line);padding-bottom:12px}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:23px;letter-spacing:-.02em;margin:0}
  .stamp{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);margin-left:auto}
  .src{display:flex;gap:8px;align-items:center;margin:12px 0 4px;font-size:12.5px}
  .src label{color:var(--muted);font-family:"JetBrains Mono",monospace}
  .src input{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);color:var(--txt);
    padding:7px 10px;border-radius:6px;font-family:"JetBrains Mono",monospace;font-size:12px}
  .src button{background:var(--accent);color:#03121f;border:0;padding:7px 14px;border-radius:6px;font-weight:600;cursor:pointer}
  .banner{margin:10px 0;padding:9px 12px;border-radius:6px;font-size:12.5px;display:none}
  .banner.show{display:block}.banner.sample{background:#2a2310;border:1px solid #4a3c12;color:#e8c878}
  .banner.err{background:#2a1414;border:1px solid #4a1f1f;color:#f0a0a0}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:14px 0 6px}
  select,.bar input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    padding:8px 10px;border-radius:6px;font-size:13px}
  .bar input[type=text]{min-width:180px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--muted);border:0;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--panel2);color:var(--txt)}
  .count{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  .mode-label{font-size:12px;color:var(--dim);font-family:"JetBrains Mono",monospace;padding:4px 0}
  table{width:100%;border-collapse:collapse;margin-top:4px}
  thead th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);
    font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line)}
  th.num,td.num{text-align:right;font-family:"JetBrains Mono",monospace}
  tbody td{padding:9px 10px;border-bottom:1px solid #1a222b;font-size:14px}
  tbody tr:hover{background:var(--panel)}
  td.rank{font-family:"JetBrains Mono",monospace;color:var(--muted);font-weight:600;width:48px;text-align:right}
  td.rank.top{color:var(--accent)}
  .title{font-weight:600}.artist{color:var(--muted);font-size:13px}
  .genre{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);background:var(--panel2);
    padding:2px 7px;border-radius:4px;white-space:nowrap}
  .mv{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:12.5px}
  .mv.up{color:var(--up)}.mv.down{color:var(--down)}.mv.flat{color:var(--flat)}.mv.new{color:var(--up)}
  .st{font-family:"JetBrains Mono",monospace;font-size:12.5px;color:var(--muted)}
  .dash{color:var(--dim)}
  footer{margin-top:18px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--dim);line-height:1.6}
</style>
</head>

  <select id="genre"></select>

  <span class="count" id="count"></span>
</div>
<div class="mode-label" id="modelabel"></div>

<table>
  <thead id="thead"></thead>
  <tbody id="rows"></tbody>
</table>
<footer id="foot"></footer>

function getRows(){
  if(isGenreMode()) return P.genre_charts[state.genre];
  return ((P.data[state.region]||{})[state.period])||[];
}

function render(){
  const genreMode=isGenreMode();
  const q=state.q.toLowerCase();
  const all=getRows();
  const rows=all.filter(r=>!q||((r.artist||"")+" "+(r.title||"")).toLowerCase().includes(q));

  // Toggle controls visibility
  $("#periodseg").style.opacity=genreMode?"0.3":"1";
  $("#region").style.opacity=genreMode?"0.3":"1";

  if(genreMode){
    $("#modelabel").textContent="Top "+state.genre+" · recent releases only";
    $("#thead").innerHTML='<tr><th class="num">#</th><th>Track</th><th>Artist</th></tr>';
    $("#rows").innerHTML=rows.map(r=>`<tr>
      <td class="rank ${r.rank<=10?'top':''}">${r.rank}</td>
      <td><span class="title">${r.title||''}</span></td>
      <td><span class="artist">${r.artist||''}</span></td></tr>`).join("");
  } else {
    const label=(P.region_labels||{})[state.region]||state.region;
    $("#modelabel").textContent=label+" · Spotify Top 200 · "+state.period;
    $("#thead").innerHTML='<tr><th class="num">#</th><th>Track</th><th>Genre</th><th class="num">Move</th><th class="num">Streams</th></tr>';
    $("#rows").innerHTML=rows.map(r=>`<tr>
      <td class="rank ${r.rank<=10?'top':''}">${r.rank}</td>
      <td><div class="title">${r.title||''}</div><div class="artist">${r.artist||''}</div></td>
      <td>${r.genre?'<span class="genre">'+r.genre+'</span>':''}</td>
      <td class="num">${move(r.move)}</td>
      <td class="num"><span class="st">${fnum(r.streams)}</span></td></tr>`).join("");
  }
  $("#count").textContent=rows.length+(genreMode?" songs":" of "+all.length);
}

function buildControls(){
  $("#region").innerHTML=(P.regions||[]).map(r=>`<option value="${r}">${(P.region_labels||{})[r]||r.toUpperCase()}</option>`).join("");
  $("#region").value=state.region;
  const gc=P.genre_charts||{};
  const genreNames=Object.keys(gc).filter(g=>gc[g]&&gc[g].length).sort();
  $("#genre").innerHTML='<option value="">All genres</option>'+
    genreNames.map(g=>`<option value="${g}">${g} (${gc[g].length})</option>`).join("");
  $("#genre").value=state.genre;
}

function setData(p,isSample){
  P=p; state.region=(p.regions&&p.regions[0])||"global";
  state.period=(p.periods&&p.periods[0])||"daily"; state.genre="";
  $("#stamp").textContent=isSample?"sample data":"updated "+(p.generated_at?new Date(p.generated_at).toLocaleString():"?");
  const gc=p.genre_charts||{};
  const gcTotal=Object.values(gc).reduce((s,v)=>s+v.length,0);
  $("#foot").textContent=isSample
    ?"Sample preview. All genres = Spotify Top 200 by region. Select a genre for 60-100+ dedicated songs (recent releases only)."
    :"All genres = Spotify Top 200 (current streaming, true rank). Select a genre for its dedicated chart (60-100+ songs, recent releases only). Updates each scheduled pull. Genre charts: "+gcTotal+" songs across "+Object.keys(gc).length+" genres.";
  buildControls(); render();
}

async function load(url,silent){
  const b=$("#banner");
  try{const res=await fetch(url,{cache:"no-store"});if(!res.ok)throw new Error("HTTP "+res.status);
    setData(await res.json(),false);b.className="banner";b.textContent="";
  }catch(e){if(!silent){b.className="banner err show";
    b.textContent="Could not load ("+e.message+"). Open on GitHub Pages or as a downloaded file.";}
    setData(SAMPLE,true);}
}

$("#region").onchange=e=>{state.region=e.target.value;render();};
$("#genre").onchange=e=>{state.genre=e.target.value;render();};
$("#q").oninput=e=>{state.q=e.target.value;render();};
$("#load").onclick=()=>{const u=$("#url").value.trim();if(u)load(u);};
$("#p-daily").onclick=()=>{state.period="daily";$("#p-daily").classList.add("on");$("#p-weekly").classList.remove("on");render();};
$("#p-weekly").onclick=()=>{state.period="weekly";$("#p-weekly").classList.add("on");$("#p-daily").classList.remove("on");render();};

setData(SAMPLE,true);
load('trend_latest.json',true);
</script>
</body>
</html>
